# I2C slave mode support for loopback / endpoint simulation in QEMU.
# The primary MCTP I2C transport (CONFIG_MCTP_TRANSPORT_I2C) is enabled
# automatically via meta-phosphor's mctp/mctp.scc feature file.

# I2C slave framework (needed for software endpoint simulation)
CONFIG_I2C_SLAVE=y
CONFIG_I2C_SLAVE_EEPROM=y

# I2C character device (userspace access via /dev/i2c-*)
CONFIG_I2C_CHARDEV=y

# Keep I2C debug messages disabled in QEMU builds
CONFIG_I2C_DEBUG_CORE=n
CONFIG_I2C_DEBUG_ALGO=n
